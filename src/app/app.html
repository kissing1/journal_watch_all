<app-header [sidebarOpen]="sidebarOpen" (menuClick)="toggleSidebar()"></app-header>

<div class="app-layout">

  @if (authService.isLoggedIn && !isLoginPage) {
    @if (isAdvisor) {
      <app-sidebar-advisor [isOpen]="sidebarOpen"></app-sidebar-advisor>
    } @else if (isStaff) {
      <app-sidebar-staff [isOpen]="sidebarOpen"></app-sidebar-staff>
    } @else {
      <app-sidebar [isOpen]="sidebarOpen"></app-sidebar>
    }

    @if (sidebarOpen) {
      <div class="sidebar-backdrop" (click)="sidebarOpen = false"></div>
    }
  }

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>

<app-footer></app-footer>
