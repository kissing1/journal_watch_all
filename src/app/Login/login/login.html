<div class="login-page">
  <div class="login-card">

    <!-- Gradient top bar -->
    <div class="card-topbar"></div>

    <div class="card-body">

      <!-- LEFT: Logo + Title -->
      <div class="card-left">
        <div class="logo-wrap">
          <img class="jw-logo-img" src="/img_journal/icon_profile_v4.png" alt="Journal Watch Logo"/>
        </div>

        <div class="brand-block">
          <div class="jw-title">
            <span class="title-jw">Journal</span>
            <span class="title-watch">Watch</span>
          </div>
          <div class="jw-badge">ส่องวารสาร · MSU</div>
        </div>

        <div class="jw-sub">
          เลือกบทบาทแล้วเข้าสู่ระบบ<br>ผ่าน MSU Account
        </div>
      </div>

      <!-- DIVIDER -->
      <div class="card-divider"></div>

      <!-- RIGHT: Info + Button -->
      <div class="card-right">

        <div class="right-title">เข้าสู่ระบบ</div>

        <div class="info-box">
          <div class="info-item">
            <span class="info-icon">ℹ️</span>
            <span>นิสิตเข้าสู่ระบบด้วย MSU Google Account
              <strong>(@msu.ac.th)</strong> เท่านั้น</span>
          </div>
          <div class="info-divider"></div>
          <div class="info-item">
            <span class="info-icon"><i class="ti ti-hourglass"></i></span>
            <span>การเข้าใช้งานครั้งแรก ต้องรอการอนุมัติ
              จากผู้ดูแลระบบ</span>
          </div>
        </div>

        <div class="google-btn-wrap">
          <!-- custom full-width button — delegates click to hidden GSI button -->
          <button class="google-btn" (click)="triggerGoogleSignIn()">
            <div class="google-icon-wrap">
              <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
            </div>
            <span class="google-btn-text">ลงชื่อเข้าใช้ด้วย Google</span>
            <span class="google-btn-arrow">›</span>
          </button>
          <!-- hidden GSI button — handles actual OAuth flow -->
          <div id="google-btn" class="google-btn-hidden"></div>
        </div>

        <div class="login-note">
          <span class="note-dot"></span>
          ระบบรองรับเฉพาะบัญชี @msu.ac.th เท่านั้น
        </div>

        <div class="staff-register-link">
          <span class="staff-register-label">เจ้าหน้าที่บัณฑิตวิทยาลัย?</span>
          <a class="staff-register-btn" routerLink="/register">สมัครใช้งาน →</a>
        </div>

      </div>
    </div>
  </div>
</div>
