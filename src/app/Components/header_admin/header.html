<header class="jw-header">

  <!-- ROW 1: top bar -->
  <div class="top-bar">

    <!-- Hamburger Toggle — แสดงเฉพาะเมื่อ showToggle=true (หน้าที่มี sidebar) -->
    @if (showToggle) {
      <button class="hamburger"
              [class.open]="sidebarOpen"
              (click)="menuClick.emit()"
              aria-label="Toggle sidebar">
        <span></span>
        <span></span>
        <span></span>
      </button>
    }

    <!-- MSU Brand -->
    <div class="msu-brand">
      <div class="msu-logo">
        <svg class="msu-logo-img" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- วงกลมพื้นหลัง -->
          <circle cx="50" cy="50" r="48" fill="#1C2744" stroke="#E8A800" stroke-width="3"/>
          <!-- หนังสือ -->
          <rect x="25" y="35" width="22" height="28" rx="2" fill="#E8A800"/>
          <rect x="53" y="35" width="22" height="28" rx="2" fill="#E8A800"/>
          <rect x="46" y="33" width="8" height="32" rx="1" fill="#B88200"/>
          <!-- เส้นในหนังสือ -->
          <line x1="29" y1="42" x2="43" y2="42" stroke="#1C2744" stroke-width="1.5"/>
          <line x1="29" y1="47" x2="43" y2="47" stroke="#1C2744" stroke-width="1.5"/>
          <line x1="29" y1="52" x2="43" y2="52" stroke="#1C2744" stroke-width="1.5"/>
          <line x1="57" y1="42" x2="71" y2="42" stroke="#1C2744" stroke-width="1.5"/>
          <line x1="57" y1="47" x2="71" y2="47" stroke="#1C2744" stroke-width="1.5"/>
          <line x1="57" y1="52" x2="71" y2="52" stroke="#1C2744" stroke-width="1.5"/>
          <!-- แว่นขยาย -->
          <circle cx="65" cy="30" r="9" fill="none" stroke="#fff" stroke-width="2.5"/>
          <line x1="71" y1="36" x2="77" y2="42" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="msu-divider"></div>

      <div class="msu-text">
        <span class="msu-th">มหาวิทยาลัยมหาสารคาม</span>
        <span class="msu-en">MAHASARAKHAM UNIVERSITY</span>
      </div>
    </div>

    <!-- Journal Watch title -->
    <div class="jw-brand">
      <div class="jw-title-wrap">
        <span class="jw-title">ส่องวารสาร — ระบบตรวจสอบวารสารวิชาการ</span>
      </div>
      <span class="jw-sub">Journal Watch · Scopus &amp; TCI Verification System</span>
    </div>

  </div>

  <!-- ROW 2: yellow bar -->
  <div class="yellow-bar">
    <div class="yellow-inner">
      <span class="yellow-dot"></span>
      <span class="yellow-label">Graduate School, Mahasarakham University</span>
    </div>
  </div>

</header>
